<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyA_IgXMyoi-1wgevCSxQVRFoaKG0my5jXY",
        authDomain: "paca-382c1.firebaseapp.com",
        databaseURL: "https://paca-382c1-default-rtdb.firebaseio.com",
        projectId: "paca-382c1",

        messagingSenderId: "369440888510",
        appId: "1:369440888510:web:7c0dee82ff00ca7ddd30ef",
        measurementId: "G-BTP61G9S2W"
    };

    try { firebase.initializeApp(firebaseConfig); } catch(e) { console.error("Firebase init failed:", e); }
    const database = firebase.database();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let time = 0; let mouseX = 400; let mouseY = 300;
    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    // --- LEADERBOARD SYNC ---
    let globScores = { 1: [], 2: [], 3: [], 4: [], 5: [] };
    function syncLeaderboards() {
        for(let i=1; i<=5; i++) {
            database.ref(`PaCA/scores/L${i}`).orderByChild('time').limitToFirst(10).on('value', (s) => {
                const data = s.val(); globScores[i] = data ? Object.values(data).sort((a,b) => a.time - b.time) : [];
            });
        }
    }
    syncLeaderboards();

    function saveScoreToCloud() {
        let name = ALPHABET[state.nameChars[0]] + ALPHABET[state.nameChars[1]] + ALPHABET[state.nameChars[2]];
        try { database.ref(`PaCA/scores/L${state.currentLevel}`).push({ name: name, time: state.elapsedTime, timestamp: Date.now() }); } catch(e) {}
        state.leaderboardView = state.currentLevel; state.gameState = 'leaderboard'; playSound('win');
    }

    function formatTime(t) { let ms = Math.floor(t % 1000)||0; let s = Math.floor((t/1000)%60)||0; let m = Math.floor(t/60000)||0; return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(3,'0')}`; }

    // --- VFX: PARTICLES ---
    let particles = [];
    function createP(type) {
        if (type === 'fog') particles.push({ x: Math.random()*800, y: 350+Math.random()*100, vx: (Math.random()-0.5)*0.5, vy: 0, life: Math.random()*100, type: 'fog', size: 20+Math.random()*40 });
        else if (type === 'spark') particles.push({ x: 200+Math.random()*400, y: 120+Math.random()*40, vx: (Math.random()-0.5)*2, vy: Math.random()*2+1, life: 1.0, type: 'spark', size: 1+Math.random()*2 });
        else if (type === 'ember') particles.push({ x: 300+Math.random()*200, y: 350, vx: (Math.random()-0.5)*1, vy: -(Math.random()*2+0.5), life: 1.0, type: 'ember', size: 2+Math.random()*3 });
        else if (type === 'data') particles.push({ x: Math.random()*800, y: -10, vx: 0, vy: 2+Math.random()*3, life: 1.0, type: 'data', size: 1+Math.random()*2 });
    }

    function drawP() {
        if (state.gameState !== 'playing') return;
        if (state.room === 'desktop' && Math.random()<0.1) createP('fog');
        if (state.room === 'browser' && Math.random()<0.2) createP('spark');
        if ((state.room === 'mainframe' || state.room.includes('gpu')) && Math.random()<0.3) createP('ember');
        if ((state.room === 'taskmanager' || state.room.includes('net')) && Math.random()<0.3) createP('data');

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy;
            if (p.type === 'fog') { p.life += 0.02; ctx.fillStyle = `rgba(0,100,100,${Math.max(0,Math.sin(p.life)*0.1)})`; ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI*2); ctx.fill(); if (p.life>100 || p.x<-50 || p.x>850) particles.splice(i,1); } 
            else if (p.type === 'spark') { p.life -= 0.02; ctx.fillStyle = `rgba(0,243,255,${Math.max(0,p.life)})`; ctx.fillRect(p.x, p.y, p.size, p.size*2); if (p.life<=0) particles.splice(i,1); } 
            else if (p.type === 'ember') { p.life -= 0.015; ctx.fillStyle = `rgba(255,${100+p.life*150},0,${Math.max(0,p.life)})`; ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI*2); ctx.fill(); if (p.life<=0) particles.splice(i,1); } 
            else if (p.type === 'data') { ctx.fillStyle = `rgba(0,255,0,0.6)`; ctx.fillRect(p.x, p.y, p.size, p.size*5); if (p.y>450) particles.splice(i,1); } 
        }
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'click') { osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime+0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); osc.start(); osc.stop(audioCtx.currentTime+0.1); } 
        else if (type === 'pickup') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.setValueAtTime(800, audioCtx.currentTime+0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.3); osc.start(); osc.stop(audioCtx.currentTime+0.3); } 
        else if (type === 'win') { osc.type = 'square'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.setValueAtTime(554, audioCtx.currentTime+0.2); osc.frequency.setValueAtTime(659, audioCtx.currentTime+0.4); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+1.0); osc.start(); osc.stop(audioCtx.currentTime+1.0); } 
        else if (type === 'smash') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime+0.3); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.3); osc.start(); osc.stop(audioCtx.currentTime+0.3); }
        else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.2); osc.start(); osc.stop(audioCtx.currentTime+0.2); }
    }

    // --- STATE ---
    const state = {

        room: 'desktop', verb: 'LOOK', selectedItem: null, inventory: [], dialogue: null, message: "", messageTimer: 0, timerRunning: false, startTime: 0, elapsedTime: 0, nameChars: [0,0,0], activeCharIndex: 0, flags: {}

        state.flags = { magnetTaken: false, trashyDistracted: false, cableTaken: false, cookieTaken: false, trollFed: false, folderUnlocked: false, powerRestored: false, hammerTaken: false, floppyTaken: false, ghostAppeased: false, keyTaken: false, lockJammed: false, fuseTaken: false, preampPowered: false, cleanerTaken: false, sliderFixed: false, xlrTaken: false, micConnected: false, pasteTaken: false, fanFixed: false, codeTaken: false, npcFed: false, portKeyTaken: false, portUnlocked: false, tableTaken: false, packetHelped: false, tokenTaken: false, firewallDown: false, gameWon: false };
    }

    function showMsg(msg) { state.message = msg; state.messageTimer = 180; }

    // --- PRIMITIVES ---
    function drawGrave(x,y){ ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=15; let g=ctx.createLinearGradient(x,y,x,y+80); g.addColorStop(0,'#9a9a9a'); g.addColorStop(1,'#333'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x+40,y+30,40,Math.PI,0); ctx.lineTo(x+80,y+80); ctx.lineTo(x,y+80); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='#111'; ctx.font="bold 16px Arial"; ctx.textAlign="center"; ctx.fillText("R.I.P",x+40,y+45); }

    function drawTrashy(x,y,dis){ let h=dis?Math.sin(time*0.1)*8:0; ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=20; let g=ctx.createLinearGradient(x,y+h,x+90,y+h); g.addColorStop(0,'#fff'); g.addColorStop(0.3,'#ccc'); g.addColorStop(1,'#555'); ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(x+10,y+h+90); ctx.lineTo(x+80,y+h+90); ctx.lineTo(x+90,y+h+20); ctx.lineTo(x,y+h+20); ctx.fill(); ctx.shadowBlur=0; ctx.strokeStyle='#777'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(x+20,y+h+30); ctx.lineTo(x+25,y+h+80); ctx.moveTo(x+45,y+h+30); ctx.lineTo(x+45,y+h+80); ctx.moveTo(x+70,y+h+30); ctx.lineTo(x+65,y+h+80); ctx.stroke(); ctx.fillStyle='#444'; if(dis){ctx.beginPath(); ctx.moveTo(x-5,y+h+15); ctx.lineTo(x+85,y+h-20); ctx.lineTo(x+90,y+h); ctx.lineTo(x,y+h+20); ctx.fill();}else{ctx.fillRect(x-5,y+h+10,100,10);} }
    function drawFolder(x,y,opn){ ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=10; ctx.fillStyle='#c9962a'; ctx.fillRect(x,y+10,80,50); if(opn){ctx.fillStyle='#ffe7a0'; ctx.beginPath(); ctx.moveTo(x-10,y+60); ctx.lineTo(x+10,y+25); ctx.lineTo(x+90,y+25); ctx.lineTo(x+70,y+60); ctx.fill();}else{ctx.fillRect(x,y,30,15); ctx.fillStyle='#f5c04f'; ctx.fillRect(x,y+15,80,45); ctx.shadowBlur=0; ctx.fillStyle='#222'; ctx.fillRect(x+30,y+35,20,15); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x+40,y+35,6,Math.PI,0); ctx.stroke();} ctx.shadowBlur=0; }
    function drawTroll(x,y){ let b=y+Math.abs(Math.sin(time*0.08))*5; ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=15; ctx.fillStyle='#1c3b18'; ctx.beginPath(); ctx.arc(x+45,b+50,40,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; let g=ctx.createRadialGradient(x+30,b+30,5,x+45,b+50,40); g.addColorStop(0,'#418536'); g.addColorStop(1,'#1c3b18'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x+45,b+50,40,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+45,b+20,30,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.moveTo(x+20,b+10); ctx.lineTo(x-10,b); ctx.lineTo(x+15,b+30); ctx.fill(); ctx.beginPath(); ctx.moveTo(x+70,b+10); ctx.lineTo(x+100,b); ctx.lineTo(x+75,b+30); ctx.fill(); ctx.shadowColor='#0f0'; ctx.shadowBlur=10; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+35,b+15,8,0,Math.PI*2); ctx.arc(x+55,b+15,8,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#f00'; ctx.beginPath(); ctx.arc(x+35,b+15,3,0,Math.PI*2); ctx.arc(x+55,b+15,3,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; }
    function drawCookie(x,y){ ctx.fillStyle='#cda869'; ctx.beginPath(); ctx.arc(x+15,y+15,12,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#4a3000'; ctx.fillRect(x+8,y+10,3,3); ctx.fillRect(x+18,y+15,4,3); ctx.fillRect(x+12,y+20,3,3); ctx.fillRect(x+20,y+8,3,3); }
    function drawCable(x,y){ ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=8; ctx.strokeStyle='#050505'; ctx.lineWidth=6; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(x+5,y+5); ctx.quadraticCurveTo(x+25,y-10,x+25,y+25); ctx.stroke(); ctx.shadowBlur=0; ctx.fillStyle='#ddd'; ctx.fillRect(x+22,y+25,6,10); }
    function drawKey(x,y,c){ ctx.shadowColor=c; ctx.shadowBlur=15; ctx.fillStyle=c; ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(x+10,y+10,6,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.fillRect(x+8,y+15,4,15); ctx.fillRect(x+12,y+22,6,3); ctx.fillRect(x+12,y+27,4,3); ctx.shadowBlur=0; }
    function drawHammer(x,y){ ctx.shadowColor='#000'; ctx.shadowBlur=10; ctx.fillStyle='#6b4423'; ctx.fillRect(x+15,y+15,10,30); ctx.fillStyle='#888'; ctx.fillRect(x+5,y+5,30,15); ctx.fillStyle='#bbb'; ctx.fillRect(x+5,y+5,30,5); ctx.shadowBlur=0; }
    function drawFloppy(x,y){ ctx.shadowColor='#000'; ctx.shadowBlur=10; ctx.fillStyle='#22e'; ctx.fillRect(x+5,y+5,30,30); ctx.fillStyle='#ccc'; ctx.fillRect(x+12,y+5,16,12); ctx.fillStyle='#fff'; ctx.fillRect(x+10,y+20,20,10); ctx.shadowBlur=0; }
    function drawGhost(x,y){ let f=y+Math.sin(time*0.05)*10; ctx.shadowColor='rgba(0,255,255,0.8)'; ctx.shadowBlur=20; ctx.fillStyle='rgba(220,230,255,0.7)'; ctx.beginPath(); ctx.arc(x+30,f+20,20,Math.PI,0); ctx.lineTo(x+50,f+60); ctx.lineTo(x+40,f+50); ctx.lineTo(x+30,f+60); ctx.lineTo(x+20,f+50); ctx.lineTo(x+10,f+60); ctx.lineTo(x+10,f+20); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(x+22,f+20,6,0,Math.PI*2); ctx.arc(x+38,f+20,6,0,Math.PI*2); ctx.fill(); ctx.fillStyle='black'; ctx.beginPath(); ctx.arc(x+22,f+20,2,0,Math.PI*2); ctx.arc(x+38,f+20,2,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x+30,f+35,10,0,Math.PI); ctx.stroke(); }
    function drawFuse(x,y){ ctx.shadowColor='#0ff'; ctx.shadowBlur=10; ctx.fillStyle='rgba(200,255,255,0.8)'; ctx.fillRect(x+10,y+5,10,20); ctx.fillStyle='#ccc'; ctx.fillRect(x+10,y+2,10,5); ctx.fillRect(x+10,y+23,10,5); ctx.shadowBlur=0; }
    function drawCleaner(x,y){ ctx.fillStyle='#d00'; ctx.fillRect(x+10,y+10,15,20); ctx.fillStyle='#fff'; ctx.fillRect(x+10,y+15,15,5); ctx.fillStyle='#222'; ctx.fillRect(x+15,y+5,5,5); ctx.strokeStyle='#f00'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x+17,y+5); ctx.lineTo(x+25,y-5); ctx.stroke(); }
    function drawXLRCable(x,y){ ctx.strokeStyle='#222'; ctx.lineWidth=6; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(x+5,y+20); ctx.quadraticCurveTo(x+15,y-5,x+25,y+25); ctx.stroke(); ctx.fillStyle='#888'; ctx.fillRect(x+22,y+22,8,8); ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x+24,y+28,1,0,Math.PI*2); ctx.arc(x+26,y+26,1,0,Math.PI*2); ctx.arc(x+28,y+28,1,0,Math.PI*2); ctx.fill(); }
    function drawPaste(x,y){ ctx.fillStyle='#777'; ctx.fillRect(x+5,y+15,25,10); ctx.fillStyle='#aaa'; ctx.fillRect(x+30,y+17,5,6); ctx.fillStyle='#fff'; ctx.fillRect(x+5,y+15,10,10); }
    function drawRGB(x,y){ ctx.fillStyle='#ffff00'; ctx.fillRect(x+5,y+5,15,30); ctx.fillStyle='#00f3ff'; ctx.fillRect(x+20,y+5,15,30); }
    function drawTable(x,y){ ctx.fillStyle='#fff'; ctx.fillRect(x+5,y+5,25,30); ctx.fillStyle='#00f'; ctx.fillRect(x+8,y+10,19,2); ctx.fillRect(x+8,y+15,19,2); ctx.fillRect(x+8,y+20,19,2); }
    function drawToken(x,y){ ctx.shadowColor='#f00'; ctx.shadowBlur=15; ctx.fillStyle='#d00'; ctx.beginPath(); ctx.arc(x+20,y+20,15,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='#fff'; ctx.font="bold 14px Arial"; ctx.textAlign="center"; ctx.fillText("A", x+20, y+25); }

    function drawBtn(txt, x, y, w, h, active, locked=false) { ctx.fillStyle = locked ? '#222' : (active ? '#006666' : '#333'); ctx.fillRect(x, y, w, h); ctx.strokeStyle = locked ? '#111' : (active ? '#00f3ff' : '#555'); ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h); ctx.fillStyle = locked ? '#555' : (active ? '#fff' : '#ccc'); ctx.font = "bold 20px Courier New"; ctx.textAlign = "center"; ctx.fillText(locked ? "LOCKED" : txt, x + w/2, y + h/2 + 7); }

    // --- ROOMS DATA ---
    const rooms = {
        // L1

            draw: () => { ctx.fillStyle='#111'; ctx.fillRect(0,0,800,450); drawPacket(375,200); if(state.flags.packetHelped&&!state.flags.tokenTaken)drawToken(380,280); ctx.fillStyle='#0a0a2a'; ctx.fillRect(10,10,80,25); ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.fillText("<- HUB",50,27); },
            hotspots: [
                { x:375, y:200, w:50, h:50, name:"Packet", onUse:(i)=>{if(i==='table'){state.flags.packetHelped=true; state.inventory=state.inventory.filter(it=>it.id!=='table'); playSound('win');}} },
                { x:380, y:280, w:40, h:40, name:"Token", onPickUp:()=>{if(state.flags.packetHelped&&!state.flags.tokenTaken){state.flags.tokenTaken=true; state.inventory.push({id:'token',name:'AdminToken',drawIcon:drawToken}); playSound('pickup');}} },
                { x:10, y:10, w:80, h:25, name:"Door", onUse:()=>{state.room='netMain';} }
            ]
        }
    };

    // --- INPUTS ---
    window.addEventListener('keydown', (e) => {
        if (state.gameState !== 'nameEntry') return;
        if (e.key === 'ArrowUp') { state.nameChars[state.activeCharIndex] = (state.nameChars[state.activeCharIndex] + 1) % 26; playSound('click'); e.preventDefault(); } 
        else if (e.key === 'ArrowDown') { state.nameChars[state.activeCharIndex] = (state.nameChars[state.activeCharIndex] - 1 + 26) % 26; playSound('click'); e.preventDefault(); } 
        else if (e.key === 'ArrowLeft') { state.activeCharIndex = Math.max(0, state.activeCharIndex - 1); playSound('click'); e.preventDefault(); } 
        else if (e.key === 'ArrowRight') { state.activeCharIndex = Math.min(2, state.activeCharIndex + 1); playSound('click'); e.preventDefault(); } 
        else if (e.key === 'Enter') { saveScoreToCloud(); e.preventDefault(); }
    });

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect(); const sX = canvas.width / rect.width; const sY = canvas.height / rect.height;
        mouseX = (e.clientX - rect.left) * sX; mouseY = (e.clientY - rect.top) * sY;
    });

    canvas.addEventListener('mousedown', () => {
        const x = mouseX, y = mouseY;

        if (state.gameState === 'nameEntry') {
            for(let i=0; i<3; i++) {
                let cX = 300 + (i*100), cY = 400;
                if (x > cX-30 && x < cX+30 && y > cY-85 && y < cY-55) { state.activeCharIndex = i; state.nameChars[i] = (state.nameChars[i]+1)%26; playSound('click'); return; }
                if (x > cX-30 && x < cX+30 && y > cY+25 && y < cY+55) { state.activeCharIndex = i; state.nameChars[i] = (state.nameChars[i]-1+26)%26; playSound('click'); return; }
            }
            if (x > 300 && x < 500 && y > 500 && y < 550) { saveScoreToCloud(); return; } return;
        }

        if (state.gameState === 'mainMenu') {
            if(x>210 && x<390 && y>260 && y<310) { playSound('click'); resetGame(1); state.gameState='playing'; }
            else if(x>410 && x<590 && y>260 && y<310) { if(state.unlocked[2]){playSound('click'); resetGame(2); state.gameState='playing';}else{playSound('error');} }
            else if(x>210 && x<390 && y>330 && y<380) { if(state.unlocked[3]){playSound('click'); resetGame(3); state.gameState='playing';}else{playSound('error');} }
            else if(x>410 && x<590 && y>330 && y<380) { if(state.unlocked[4]){playSound('click'); resetGame(4); state.gameState='playing';}else{playSound('error');} }
            else if(x>210 && x<390 && y>400 && y<450) { if(state.unlocked[5]){playSound('click'); resetGame(5); state.gameState='playing';}else{playSound('error');} }
            else if(x>410 && x<590 && y>400 && y<450) { playSound('click'); state.leaderboardView=1; state.gameState='leaderboard'; }
            return;
        }

        if (state.gameState === 'leaderboard') {
            if (y > 130 && y < 160) {
                for(let i=1; i<=5; i++) { let tx = 150 + (i-1)*100; if(x > tx && x < tx+80) { playSound('click'); state.leaderboardView=i; return; } }
            }
            if (x > 300 && x < 500 && y > 500 && y < 550) { playSound('click'); state.gameState = 'mainMenu'; } return;
        }

        if (state.gameState !== 'playing') return;
        if (!state.timerRunning && !state.flags.gameWon) { state.timerRunning = true; state.startTime = performance.now(); }

        if (state.dialogue) { state.dialogue.options[0].action(); playSound('click'); return; }

        if (y > 450) {
            const vbs = ['LOOK', 'TALK', 'USE', 'PICKUP'];
            for (let i=0; i<4; i++) { let c=i%2, r=Math.floor(i/2); if(x>20+c*110 && x<120+c*110 && y>475+r*40 && y<505+r*40){playSound('click'); state.verb=vbs[i]; if(state.verb!=='USE')state.selectedItem=null; return;} }
            let iX = 300; for(let i=0; i<state.inventory.length; i++) { if(x>iX && x<iX+40 && y>475 && y<515){ playSound('click'); if(state.verb==='USE')state.selectedItem=state.inventory[i].id; else showMsg("It's my " + state.inventory[i].name); return; } iX+=50; } return; 
        }

        const r = rooms[state.room]; let hit = null;
        for (let hs of r.hotspots) { if (x > hs.x && x < hs.x + hs.w && y > hs.y && y < hs.y + hs.h) { hit = hs; break; } }
        if (hit) {
            if (state.verb==='LOOK'&&hit.onLook) hit.onLook(); else if (state.verb==='TALK'&&hit.onTalk) hit.onTalk(); else if (state.verb==='PICKUP'&&hit.onPickUp) hit.onPickUp(); else if (state.verb==='USE'){if(hit.name.includes("Door"))hit.onUse(); else if(state.selectedItem){hit.onUse(state.selectedItem); state.selectedItem=null;} else if(!hit.onPickUp&&!hit.onTalk)hit.onUse(); else showMsg("Select an item first.");}
        } else { if(state.verb==='USE'&&state.selectedItem){showMsg("Can't use that there."); state.selectedItem=null;} }
    });

    // --- LOOP ---
    function update() { time++; if (state.messageTimer > 0) state.messageTimer--; if (state.timerRunning) state.elapsedTime = performance.now() - state.startTime; }

    function draw() {
        ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1.0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (state.gameState === 'mainMenu') {
            ctx.fillStyle = '#050a15'; ctx.fillRect(0,0,800,600); ctx.strokeStyle = '#112'; ctx.lineWidth = 1; for(let i=0;i<800;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,600);ctx.stroke();} for(let i=0;i<600;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(800,i);ctx.stroke();}
            ctx.fillStyle = '#00f3ff'; ctx.font = "bold 70px Courier New"; ctx.textAlign = "center"; ctx.shadowColor = '#00f3ff'; ctx.shadowBlur = 25; ctx.fillText("PaCA", 400, 100); ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffff00'; ctx.font = "bold 22px Courier New"; ctx.fillText("A Point and Click Adventure Game", 400, 135);
            ctx.fillStyle = (Math.floor(time/30)%2===0)?'#f00':'#a00'; ctx.font = "bold 16px Courier New"; ctx.fillText(">> ESCAPE SEQUENCE INITIATED <<", 400, 170);
            ctx.fillStyle = '#aaa'; ctx.font = "14px Courier New"; ctx.fillText("You are a sentient pixel sprite.", 400, 195); ctx.fillText("Solve hardware logic to escape the OS before format.", 400, 215);

            drawBtn("LEVEL 1", 210, 260, 180, 50, mouseX>210&&mouseX<390&&mouseY>260&&mouseY<310);
            drawBtn("LEVEL 2", 410, 260, 180, 50, mouseX>410&&mouseX<590&&mouseY>260&&mouseY<310, !state.unlocked[2]);
            drawBtn("LEVEL 3", 210, 330, 180, 50, mouseX>210&&mouseX<390&&mouseY>330&&mouseY<380, !state.unlocked[3]);
            drawBtn("LEVEL 4", 410, 330, 180, 50, mouseX>410&&mouseX<590&&mouseY>330&&mouseY<380, !state.unlocked[4]);
            drawBtn("LEVEL 5", 210, 400, 180, 50, mouseX>210&&mouseX<390&&mouseY>400&&mouseY<450, !state.unlocked[5]);
            drawBtn("SCORES", 410, 400, 180, 50, mouseX>410&&mouseX<590&&mouseY>400&&mouseY<450);

        } else if (state.gameState === 'playing') {
            rooms[state.room].draw(); drawP();
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,450,800,150); ctx.strokeStyle = '#333'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0,450); ctx.lineTo(800,450); ctx.stroke();
            const vbs = ['LOOK', 'TALK', 'USE', 'PICKUP']; vbs.forEach((v, idx) => { let col=idx%2, row=Math.floor(idx/2); drawVerb(v, 20+col*110, 475+row*40, state.verb===v); });
            ctx.fillStyle = "#aaa"; ctx.textAlign="left"; ctx.font="12px Arial"; ctx.fillText("INVENTORY", 300, 465);
            let invX = 300; state.inventory.forEach(item => {
                ctx.fillStyle = '#111'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.fillRect(invX, 475, 40, 40); ctx.strokeRect(invX, 475, 40, 40);
                if (item.drawIcon) { ctx.save(); ctx.translate(invX+5, 480); ctx.scale(0.8,0.8); item.drawIcon(0,0); ctx.restore(); } else if (item.textCode) { ctx.fillStyle = "#0f0"; ctx.textAlign="center"; ctx.fillText(item.textCode, invX+20, 500); }
                if (state.selectedItem === item.id) { ctx.strokeStyle = '#00f3ff'; ctx.strokeRect(invX-2, 473, 44, 44); } invX += 50;
            });
            if (state.messageTimer > 0) { ctx.fillStyle = "#00f3ff"; ctx.shadowColor = "#00f3ff"; ctx.shadowBlur = 10; ctx.font = "16px Arial"; ctx.textAlign="center"; ctx.fillText(state.message, 400, 580); ctx.shadowBlur = 0; }
            if (state.dialogue) { ctx.fillStyle = 'rgba(0,10,20,0.9)'; ctx.fillRect(100,300,600,100); ctx.fillStyle = "white"; ctx.textAlign="left"; ctx.fillText(state.dialogue.text, 120, 330); ctx.fillStyle = "#00f3ff"; ctx.fillText(`1. ${state.dialogue.options[0].text}`, 140, 360); }
            ctx.fillStyle = state.timerRunning ? "#00f3ff" : "#555"; ctx.font = "bold 16px Courier New"; ctx.textAlign = "right"; ctx.fillText(`L${state.currentLevel} TIME: ${formatTime(state.elapsedTime)}`, 780, 480);
            
            // Post-Process Overlay
            if (mouseY < 450) {
                ctx.globalCompositeOperation = 'overlay'; let lg = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 250); lg.addColorStop(0, 'rgba(255,255,255,0.4)'); lg.addColorStop(0.5, 'rgba(0,255,255,0.1)'); lg.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = lg; ctx.fillRect(0,0,800,450); ctx.globalCompositeOperation = 'source-over';
            }
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; for(let i=0;i<450;i+=4)ctx.fillRect(0,i,800,2);
            let g = ctx.createRadialGradient(400,300,200,400,300,550); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.8)'); ctx.fillStyle = g; ctx.fillRect(0,0,800,600);

        } else if (state.gameState === 'nameEntry') {
            ctx.fillStyle = '#050515'; ctx.fillRect(0,0,800,600); ctx.fillStyle = '#0f0'; ctx.font = "bold 40px Courier New"; ctx.textAlign = "center"; ctx.fillText("ESCAPE SUCCESSFUL", 400, 150); ctx.fillStyle = '#fff'; ctx.font = "20px Courier New"; ctx.fillText(`LEVEL ${state.currentLevel} TIME: ${formatTime(state.elapsedTime)}`, 400, 200); ctx.fillStyle = '#aaa'; ctx.font = "16px Courier New"; ctx.fillText("ENTER INITIALS", 400, 260);
            for(let i=0; i<3; i++) {
                let cX = 300 + (i*100), cY = 400; ctx.strokeStyle = i===state.activeCharIndex ? '#00f3ff' : '#222'; ctx.lineWidth = 4; ctx.strokeRect(cX-30, cY-45, 60, 60); ctx.fillStyle = i===state.activeCharIndex ? '#00f3ff' : '#fff'; ctx.font = "bold 48px Courier New"; ctx.fillText(ALPHABET[state.nameChars[i]], cX, cY);
                let hU = mouseX>cX-30 && mouseX<cX+30 && mouseY>cY-85 && mouseY<cY-55; ctx.fillStyle = hU ? '#fff' : '#00f3ff'; ctx.beginPath(); ctx.moveTo(cX, cY-80); ctx.lineTo(cX-15, cY-60); ctx.lineTo(cX+15, cY-60); ctx.fill();
                let hD = mouseX>cX-30 && mouseX<cX+30 && mouseY>cY+25 && mouseY<cY+55; ctx.fillStyle = hD ? '#fff' : '#00f3ff'; ctx.beginPath(); ctx.moveTo(cX, cY+50); ctx.lineTo(cX-15, cY+30); ctx.lineTo(cX+15, cY+30); ctx.fill();
            }
            drawBtn("SAVE SCORE", 300, 500, 200, 50, mouseX>300&&mouseX<500&&mouseY>500&&mouseY<550);
        } else if (state.gameState === 'leaderboard') {
            ctx.fillStyle = '#100505'; ctx.fillRect(0,0,800,600); ctx.fillStyle = '#ffff00'; ctx.font = "bold 40px Courier New"; ctx.textAlign = "center"; ctx.fillText("HIGH SCORES", 400, 80);
            
            for(let i=1; i<=5; i++) {
                let tx = 150 + (i-1)*100; let hov = mouseX>tx && mouseX<tx+80 && mouseY>130 && mouseY<160;
                ctx.fillStyle = state.leaderboardView===i ? '#00f3ff' : (hov ? '#fff' : '#444');
                ctx.font = "bold 18px Courier New"; ctx.fillText(`L${i}`, tx+40, 150);
            }
            let cLb = globScores[state.leaderboardView] || [];
            ctx.fillStyle = '#fff'; ctx.font = "bold 20px Courier New"; ctx.textAlign = "left"; let lY = 200;
            if(cLb.length===0){ctx.textAlign="center"; ctx.fillText("NO DATA FOUND", 400, 300);}else{cLb.forEach((e, i)=>{ctx.fillStyle=i===0?'#ffff00':(i<3?'#aaa':'#666'); ctx.fillText(`${(i+1).toString().padStart(2,' ')}. ${e.name}`, 250, lY); ctx.textAlign="right"; ctx.fillText(formatTime(e.time), 550, lY); ctx.textAlign="left"; lY+=30;});}
            drawBtn("MAIN MENU", 300, 520, 200, 40, mouseX>300&&mouseX<500&&mouseY>520&&mouseY<560);
        }
        
        ctx.fillStyle = '#00f3ff'; ctx.shadowColor = '#00f3ff'; ctx.shadowBlur = 10; ctx.fillRect(mouseX-2, mouseY-2, 4, 4); ctx.fillStyle = '#fff'; ctx.fillRect(mouseX-1, mouseY-1, 2, 2); ctx.shadowBlur = 0;
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
