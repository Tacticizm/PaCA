<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaCA - Point and Click Adventure</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #020202; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 600px; }
        canvas { 
            background-color: #000; 
            border: 8px solid #111; 
            border-radius: 12px; 
            box-shadow: 0 0 50px rgba(0, 255, 200, 0.2); 
            cursor: none; 
            display: block;
            touch-action: none; /* Prevents scrolling on mobile/tablets */
        }
        /* Hidden real cursor fix */
        #custom-cursor {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #0ff;
            box-shadow: 0 0 10px #0ff;
            pointer-events: none; /* CRITICAL: Allows clicks to pass through to the canvas */
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="custom-cursor"></div>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyA_IgXMyoi-1wgevCSxQVRFoaKG0my5jXY",
        authDomain: "paca-382c1.firebaseapp.com",
        databaseURL: "https://paca-382c1-default-rtdb.firebaseio.com",
        projectId: "paca-382c1",
        storageBucket: "paca-382c1.firebasestorage.app",
        messagingSenderId: "369440888510",
        appId: "1:369440888510:web:7c0dee82ff00ca7ddd30ef",
        measurementId: "G-BTP61G9S2W"
    };

    try { firebase.initializeApp(firebaseConfig); } catch(e) { console.error(e); }
    const database = firebase.database();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const cursorEl = document.getElementById('custom-cursor');
    let time = 0, mouseX = 400, mouseY = 300;
    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    // --- LEADERBOARD SYNC ---
    let globalScoresL1 = [], globalScoresL2 = [];
    function syncLeaderboards() {
        database.ref('PaCA/scores/L1').orderByChild('time').limitToFirst(10).on('value', (s) => {
            const data = s.val(); globalScoresL1 = data ? Object.values(data).sort((a,b) => a.time - b.time) : [];
        });
        database.ref('PaCA/scores/L2').orderByChild('time').limitToFirst(10).on('value', (s) => {
            const data = s.val(); globalScoresL2 = data ? Object.values(data).sort((a,b) => a.time - b.time) : [];
        });
    }
    syncLeaderboards();

    function saveScoreToCloud() {
        let name = ALPHABET[state.nameChars[0]] + ALPHABET[state.nameChars[1]] + ALPHABET[state.nameChars[2]];
        try { database.ref(`PaCA/scores/L${state.currentLevel}`).push({ name: name, time: state.elapsedTime, timestamp: Date.now() }); } catch(e) {}
        state.leaderboardView = state.currentLevel; state.gameState = 'leaderboard'; playSound('win');
    }

    // --- AUDIO & VFX ---
    let particles = [];
    function createParticle(type, x, y) {
        if (type === 'fog') particles.push({ x: Math.random() * 800, y: 350 + Math.random() * 100, vx: (Math.random() - 0.5) * 0.5, vy: 0, life: Math.random() * 100, type: 'fog', size: 20 + Math.random() * 40 });
        else if (type === 'spark') particles.push({ x: 200 + Math.random() * 400, y: 120 + Math.random() * 40, vx: (Math.random() - 0.5) * 2, vy: Math.random() * 2 + 1, life: 1.0, type: 'spark', size: 1 + Math.random() * 2 });
        else if (type === 'ember') particles.push({ x: 300 + Math.random() * 200, y: 350, vx: (Math.random() - 0.5) * 1, vy: -(Math.random() * 2 + 0.5), life: 1.0, type: 'ember', size: 2 + Math.random() * 3 });
        else if (type === 'data') particles.push({ x: Math.random() * 800, y: -10, vx: 0, vy: 2 + Math.random() * 3, life: 1.0, type: 'data', size: 1 + Math.random() * 2 });
        else if (type === 'dust') particles.push({ x: Math.random() * 800, y: 100 + Math.random() * 300, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, life: Math.random() * 100, type: 'dust', size: 2 + Math.random() * 5 });
        else if (type === 'stream') particles.push({ x: 350 + Math.random() * 100, y: 450, vx: (Math.random() - 0.5) * 2, vy: -(2 + Math.random() * 4), life: 1.0, type: 'stream', size: 2 + Math.random() * 3 });
    }

    function updateAndDrawParticles() {
        if (state.gameState !== 'playing') return;
        if (state.room === 'desktop' && Math.random() < 0.1) createParticle('fog');
        if (state.room === 'browser' && Math.random() < 0.2) createParticle('spark');
        if (state.room === 'mainframe' && Math.random() < 0.3) createParticle('ember');
        if (state.room === 'taskmanager' && Math.random() < 0.3) createParticle('data');
        if (state.room === 'registry' && Math.random() < 0.1) createParticle('dust');
        if (state.room === 'usbport' && Math.random() < 0.4) createParticle('stream');
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy;
            if (p.type === 'fog') { p.life += 0.02; ctx.fillStyle = `rgba(0, 100, 100, ${Math.max(0, Math.sin(p.life) * 0.1)})`; ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2); ctx.fill(); if (p.life > 100 || p.x < -50 || p.x > 850) particles.splice(i, 1); } 
            else if (p.type === 'spark') { p.life -= 0.02; ctx.fillStyle = `rgba(0, 255, 255, ${Math.max(0, p.life)})`; ctx.fillRect(p.x, p.y, p.size, p.size * 2); if (p.life <= 0) particles.splice(i, 1); } 
            else if (p.type === 'ember') { p.life -= 0.015; ctx.fillStyle = `rgba(255, ${100 + p.life*150}, 0, ${Math.max(0, p.life)})`; ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2); ctx.fill(); if (p.life <= 0) particles.splice(i, 1); } 
            else if (p.type === 'data') { ctx.fillStyle = `rgba(0, 255, 0, 0.6)`; ctx.fillRect(p.x, p.y, p.size, p.size * 5); if (p.y > 450) particles.splice(i, 1); } 
            else if (p.type === 'dust') { p.life += 0.02; ctx.fillStyle = `rgba(150, 100, 200, ${Math.max(0, Math.sin(p.life) * 0.3)})`; ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2); ctx.fill(); if (p.life > 100) particles.splice(i, 1); } 
            else if (p.type === 'stream') { p.life -= 0.015; ctx.fillStyle = `rgba(0, 200, 255, ${Math.max(0, p.life)})`; ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2); ctx.fill(); if (p.life <= 0) particles.splice(i, 1); }
        }
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'click') { osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.05); } 
        else if (type === 'pickup') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2); } 
        else if (type === 'win') { osc.type = 'square'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.5); } 
        else if (type === 'smash') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
        else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2); }
    }

    // --- GAME ENGINE ---
    const state = {
        gameState: 'mainMenu', currentLevel: 1, leaderboardView: 1,
        level2Unlocked: localStorage.getItem('PaCA_L2Unlocked') === 'true',
        room: 'desktop', verb: 'LOOK', selectedItem: null, inventory: [], dialogue: null,
        message: "", messageTimer: 0, timerRunning: false, startTime: 0, elapsedTime: 0,
        nameChars: [0, 0, 0], activeCharIndex: 0, flags: {}
    };

    function resetGame(level) {
        state.currentLevel = level; state.room = level === 1 ? 'desktop' : 'taskmanager';
        state.verb = 'LOOK'; state.selectedItem = null; state.inventory = []; state.dialogue = null;
        state.message = level === 1 ? "Avoid the format." : "RAM escape sequence."; 
        state.messageTimer = 180; state.timerRunning = false; state.startTime = 0; state.elapsedTime = 0; state.nameChars = [0, 0, 0]; state.activeCharIndex = 0; particles = [];
        state.flags = { magnetTaken: false, trashyDistracted: false, cableTaken: false, cookieTaken: false, trollFed: false, folderUnlocked: false, powerRestored: false, hammerTaken: false, floppyTaken: false, ghostAppeased: false, keyTaken: false, lockJammed: false, gameWon: false };
    }

    function showMessage(msg) { state.message = msg; state.messageTimer = 180; }

    // --- DRAWING ASSETS ---
    function drawGrave(x, y) { ctx.fillStyle = '#666'; ctx.beginPath(); ctx.arc(x + 40, y + 30, 40, Math.PI, 0); ctx.lineTo(x + 80, y + 80); ctx.lineTo(x, y + 80); ctx.fill(); ctx.fillStyle = '#111'; ctx.font = "bold 16px Arial"; ctx.textAlign = "center"; ctx.fillText("R.I.P", x + 40, y + 45); }
    function drawMagnet(x, y) { ctx.strokeStyle = '#d00'; ctx.lineWidth = 8; ctx.beginPath(); ctx.arc(x + 15, y + 15, 12, Math.PI, 0); ctx.stroke(); }
    function drawTrashy(x, y, dis) { let hover = dis ? Math.sin(time*0.1)*8 : 0; ctx.fillStyle = '#888'; ctx.fillRect(x, y+20+hover, 90, 70); ctx.fillStyle = '#444'; ctx.fillRect(x-5, y+10+hover, 100, 10); }
    function drawFolder(x, y, opn) { ctx.fillStyle = opn ? '#ffe7a0' : '#c9962a'; ctx.fillRect(x, y+10, 80, 50); }
    function drawTroll(x, y) { ctx.fillStyle = '#1c3b18'; ctx.beginPath(); ctx.arc(x+45, y+45, 40, 0, Math.PI*2); ctx.fill(); }
    function drawGoldKey(x, y) { ctx.fillStyle = '#ffd700'; ctx.fillRect(x+8, y+5, 15, 25); }
    function drawRootKey(x, y) { ctx.fillStyle = '#5f5'; ctx.fillRect(x+8, y+5, 15, 25); }
    function drawHammer(x, y) { ctx.fillStyle = '#6b4423'; ctx.fillRect(x+15, y+15, 10, 30); ctx.fillStyle = '#888'; ctx.fillRect(x+5, y+5, 30, 15); }
    function drawFloppy(x, y) { ctx.fillStyle = '#22e'; ctx.fillRect(x+5, y+5, 30, 30); }
    function drawGhost(x, y) { let float = Math.sin(time*0.05)*10; ctx.fillStyle = 'rgba(220, 230, 255, 0.7)'; ctx.beginPath(); ctx.arc(x+30, y+20+float, 20, Math.PI, 0); ctx.lineTo(x+50, y+60+float); ctx.lineTo(x+10, y+60+float); ctx.fill(); }
    function drawGateway(x, y, opn) { ctx.fillStyle = opn ? '#052205' : '#220505'; ctx.fillRect(x, y, 120, 160); }
    function drawLock(x, y, jam) { ctx.fillStyle = '#daa520'; ctx.fillRect(x, y+10, 30, 25); }
    function drawMenuButton(txt, x, y, w, h, active, locked=false) { ctx.fillStyle = locked ? '#222' : (active ? '#006666' : '#333'); ctx.fillRect(x, y, w, h); ctx.fillStyle = locked ? '#555' : (active ? '#fff' : '#ccc'); ctx.font = "bold 20px Courier New"; ctx.textAlign = "center"; ctx.fillText(locked ? "LOCKED" : txt, x + w/2, y + h/2 + 7); }
    function drawButton(txt, x, y, active) { ctx.fillStyle = active ? '#004444' : '#222'; ctx.fillRect(x, y, 100, 30); ctx.fillStyle = active ? '#fff' : '#ccc'; ctx.font = "bold 14px Arial"; ctx.textAlign = "center"; ctx.fillText(txt, x + 50, y + 20); }

    // --- ROOMS ---
    const rooms = {
        desktop: {
            draw: () => { ctx.fillStyle = '#001111'; ctx.fillRect(0,0,800,450); drawGrave(100, 300); if(!state.flags.magnetTaken) drawMagnet(140, 360); drawTrashy(600, 270, state.flags.trashyDistracted); if(state.flags.trashyDistracted && !state.flags.cableTaken) ctx.fillRect(630, 230, 10, 30); drawFolder(350, 150, state.flags.folderUnlocked); },
            hotspots: [
                { x: 100, y: 300, w: 80, h: 80, onUse: () => { if(!state.flags.magnetTaken) { state.flags.magnetTaken = true; state.inventory.push({id: 'magnet', name: 'Magnet', drawIcon: drawMagnet}); playSound('pickup'); } } },
                { x: 600, y: 270, w: 90, h: 90, onUse: (i) => { if(i==='magnet') { state.flags.trashyDistracted=true; playSound('click'); } else if(state.flags.trashyDistracted && !state.flags.cableTaken) { state.flags.cableTaken=true; state.inventory.push({id: 'cable', name: 'Cable', drawIcon: drawMagnet}); playSound('pickup'); } } },
                { x: 350, y: 150, w: 80, h: 60, onUse: (i) => { if(i==='key' && !state.flags.folderUnlocked) { state.flags.folderUnlocked=true; playSound('click'); } else if(state.flags.folderUnlocked && !state.inventory.some(it=>it.id==='code')) { state.inventory.push({id: 'code', name: 'Code', textCode: '1234'}); playSound('pickup'); } } },
                { x: 700, y: 50, w: 80, h: 50, name: 'Door', onUse: () => { state.room = 'browser'; } }
            ]
        },
        browser: {
            draw: () => { ctx.fillStyle = '#ccc'; ctx.fillRect(40, 40, 720, 380); drawTroll(350, 250); if(!state.flags.trollFed) drawGoldKey(400, 320); },
            hotspots: [
                { x: 200, y: 120, w: 400, h: 40, onUse: () => { if(!state.flags.cookieTaken) { state.flags.cookieTaken=true; state.inventory.push({id: 'cookie', name: 'Cookie', drawIcon: drawFloppy}); playSound('pickup'); } } },
                { x: 350, y: 250, w: 90, h: 90, onUse: (i) => { if(i==='cookie') { state.flags.trollFed=true; state.inventory = state.inventory.filter(it=>it.id!=='cookie'); playSound('click'); } else if(state.flags.trollFed && !state.inventory.some(it=>it.id==='key')) { state.inventory.push({id: 'key', name: 'Key', drawIcon: drawGoldKey}); playSound('pickup'); } } },
                { x: 10, y: 10, w: 80, h: 25, name: 'Door', onUse: () => { state.room = 'desktop'; } },
                { x: 710, y: 10, w: 80, h: 25, name: 'Door', onUse: () => { state.room = 'mainframe'; } }
            ]
        },
        mainframe: {
            draw: () => { ctx.fillStyle = '#050000'; ctx.fillRect(0,0,800,450); ctx.fillStyle='#111'; ctx.fillRect(300,150,200,200); if(state.flags.powerRestored) { ctx.fillStyle='#0f0'; ctx.fillRect(320,170,160,80); } },
            hotspots: [
                { x: 300, y: 150, w: 200, h: 200, onUse: (i) => { if(state.flags.powerRestored && i==='code') { state.flags.gameWon=true; state.timerRunning=false; state.level2Unlocked=true; localStorage.setItem('PaCA_L2Unlocked', 'true'); state.gameState='nameEntry'; } } },
                { x: 550, y: 300, w: 50, h: 50, onUse: (i) => { if(i==='cable') { state.flags.powerRestored=true; state.inventory=state.inventory.filter(it=>it.id!=='cable'); playSound('click'); } } },
                { x: 20, y: 50, w: 80, h: 40, name: 'Door', onUse: () => { state.room = 'browser'; } }
            ]
        },
        taskmanager: {
            draw: () => { ctx.fillStyle = '#001100'; ctx.fillRect(0,0,800,450); if(!state.flags.hammerTaken) drawHammer(200, 220); if(!state.flags.floppyTaken) drawFloppy(450, 305); },
            hotspots: [
                { x: 200, y: 220, w: 40, h: 40, onUse: () => { if(!state.flags.hammerTaken) { state.flags.hammerTaken=true; state.inventory.push({id: 'hammer', name: 'Hammer', drawIcon: drawHammer}); playSound('pickup'); } } },
                { x: 450, y: 305, w: 40, h: 40, onUse: () => { if(!state.flags.floppyTaken) { state.flags.floppyTaken=true; state.inventory.push({id: 'floppy', name: 'Floppy', drawIcon: drawFloppy}); playSound('pickup'); } } },
                { x: 700, y: 50, w: 80, h: 50, name: 'Door', onUse: () => { state.room = 'registry'; } }
            ]
        },
        registry: {
            draw: () => { ctx.fillStyle = '#0a0011'; ctx.fillRect(0,0,800,450); if(!state.flags.ghostAppeased) drawGhost(350, 200); if(state.flags.ghostAppeased && !state.flags.keyTaken) drawRootKey(360, 280); },
            hotspots: [
                { x: 350, y: 200, w: 60, h: 60, onUse: (i) => { if(i==='floppy') { state.flags.ghostAppeased=true; state.inventory=state.inventory.filter(it=>it.id!=='floppy'); playSound('win'); } } },
                { x: 360, y: 280, w: 40, h: 40, onUse: () => { if(state.flags.ghostAppeased && !state.flags.keyTaken) { state.flags.keyTaken=true; state.inventory.push({id: 'rootkey', name: 'RootKey', drawIcon: drawRootKey}); playSound('pickup'); } } },
                { x: 10, y: 10, w: 80, h: 25, name: 'Door', onUse: () => { state.room = 'taskmanager'; } },
                { x: 710, y: 10, w: 80, h: 25, name: 'Door', onUse: () => { state.room = 'usbport'; } }
            ]
        },
        usbport: {
            draw: () => { ctx.fillStyle = '#000011'; ctx.fillRect(0,0,800,450); drawGateway(340, 140, state.flags.gameWon); if(!state.flags.gameWon) drawLock(385, 200, state.flags.lockJammed); },
            hotspots: [
                { x: 385, y: 200, w: 30, h: 35, onUse: (i) => { if(i==='rootkey') { state.flags.lockJammed=true; state.inventory=state.inventory.filter(it=>it.id!=='rootkey'); playSound('error'); } else if(i==='hammer' && state.flags.lockJammed) { state.flags.gameWon=true; state.timerRunning=false; playSound('smash'); setTimeout(()=>{state.gameState='nameEntry';},1500); } } },
                { x: 20, y: 50, w: 80, h: 40, name: 'Door', onUse: () => { state.room = 'registry'; } }
            ]
        }
    };

    // --- INPUTS (FIXED FOR GITHUB) ---
    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        mouseX = (e.clientX - rect.left) * scaleX;
        mouseY = (e.clientY - rect.top) * scaleY;
        // Move the visual cursor div
        cursorEl.style.left = e.clientX + 'px';
        cursorEl.style.top = e.clientY + 'px';
    });

    window.addEventListener('mousedown', (e) => {
        const x = mouseX, y = mouseY;
        if (state.gameState === 'mainMenu') {
            if (x > 300 && x < 500 && y > 250 && y < 300) { resetGame(1); state.gameState = 'playing'; }
            else if (x > 300 && x < 500 && y > 330 && y < 380 && state.level2Unlocked) { resetGame(2); state.gameState = 'playing'; }
            else if (x > 300 && x < 500 && y > 410 && y < 460) state.gameState = 'leaderboard';
            playSound('click');
        } else if (state.gameState === 'leaderboard') {
            if (x > 250 && x < 350 && y > 130 && y < 160) state.leaderboardView = 1;
            else if (x > 450 && x < 550 && y > 130 && y < 160) state.leaderboardView = 2;
            else if (x > 300 && x < 500 && y > 500 && y < 550) state.gameState = 'mainMenu';
            playSound('click');
        } else if (state.gameState === 'playing') {
            if (!state.timerRunning && !state.flags.gameWon) { state.timerRunning = true; state.startTime = performance.now(); }
            if (y > 450) {
                const verbs = ['LOOK', 'TALK', 'USE', 'PICKUP'];
                for (let i = 0; i < verbs.length; i++) {
                    let col = i % 2, row = Math.floor(i / 2);
                    if (x > 20 + col * 110 && x < 120 + col * 110 && y > 475 + row * 40 && y < 505 + row * 40) { state.verb = verbs[i]; playSound('click'); return; }
                }
                let invX = 300;
                for (let i = 0; i < state.inventory.length; i++) {
                    if (x > invX && x < invX + 40 && y > 475 && y < 515) {
                        if (state.verb === 'USE') state.selectedItem = state.inventory[i].id;
                        playSound('click'); return;
                    } invX += 50;
                }
            } else {
                const r = rooms[state.room]; let hit = null;
                for (let hs of r.hotspots) { if (x > hs.x && x < hs.x + hs.w && y > hs.y && y < hs.y + hs.h) { hit = hs; break; } }
                if (hit) { if (hit.name === 'Door') hit.onUse(); else if (state.verb === 'PICKUP' || state.verb === 'USE') hit.onUse(state.selectedItem); state.selectedItem = null; playSound('click'); }
            }
        }
    });

    window.addEventListener('keydown', (e) => {
        if (state.gameState !== 'nameEntry') return;
        if (e.key === 'ArrowUp') state.nameChars[state.activeCharIndex] = (state.nameChars[state.activeCharIndex] + 1) % 26;
        else if (e.key === 'ArrowDown') state.nameChars[state.activeCharIndex] = (state.nameChars[state.activeCharIndex] - 1 + 26) % 26;
        else if (e.key === 'ArrowLeft') state.activeCharIndex = Math.max(0, state.activeCharIndex - 1);
        else if (e.key === 'ArrowRight') state.activeCharIndex = Math.min(2, state.activeCharIndex + 1);
        else if (e.key === 'Enter') saveScoreToCloud();
        playSound('click'); e.preventDefault();
    });

    // --- LOOP ---
    function loop() {
        time++; if (state.timerRunning) state.elapsedTime = performance.now() - state.startTime;
        ctx.globalCompositeOperation = 'source-over'; ctx.clearRect(0, 0, 800, 600);
        if (state.gameState === 'mainMenu') {
            ctx.fillStyle = '#050a15'; ctx.fillRect(0, 0, 800, 600); ctx.fillStyle = '#0ff'; ctx.font = "bold 48px Courier New"; ctx.textAlign = "center"; ctx.fillText("PaCA", 400, 120);
            drawMenuButton("LEVEL 1", 300, 250, 200, 50, mouseX>300 && mouseX<500 && mouseY>250 && mouseY<300);
            drawMenuButton("LEVEL 2", 300, 330, 200, 50, mouseX>300 && mouseX<500 && mouseY>330 && mouseY<380, !state.level2Unlocked);
            drawMenuButton("SCORES", 300, 410, 200, 50, mouseX>300 && mouseX<500 && mouseY>410 && mouseY<460);
        } else if (state.gameState === 'playing') {
            rooms[state.room].draw(); updateAndDrawParticles();
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 450, 800, 150);
            const vbs = ['LOOK', 'TALK', 'USE', 'PICKUP'];
            vbs.forEach((v, idx) => { let col = idx % 2, row = Math.floor(idx / 2); drawButton(v, 20+col*110, 475+row*40, state.verb===v); });
            let invX = 300; state.inventory.forEach(item => {
                ctx.fillStyle = '#111'; ctx.fillRect(invX, 475, 40, 40);
                if (item.drawIcon) { ctx.save(); ctx.translate(invX+5, 480); ctx.scale(0.8,0.8); item.drawIcon(0,0); ctx.restore(); }
                if (state.selectedItem === item.id) { ctx.strokeStyle = '#0ff'; ctx.strokeRect(invX-2, 473, 44, 44); } invX += 50;
            });
            ctx.fillStyle = state.timerRunning ? "#0ff" : "#555"; ctx.font = "bold 14px Courier New"; ctx.textAlign = "right"; ctx.fillText(`L${state.currentLevel}: ${formatTime(state.elapsedTime)}`, 780, 480);
        } else if (state.gameState === 'nameEntry') {
            ctx.fillStyle = '#050515'; ctx.fillRect(0,0,800,600); ctx.fillStyle='#0f0'; ctx.textAlign="center"; ctx.font="bold 30px Courier New"; ctx.fillText("ESCAPE SUCCESS", 400, 150);
            for(let i=0; i<3; i++) { let cX = 300 + (i*100); ctx.strokeStyle = i === state.activeCharIndex ? '#0ff' : '#222'; ctx.strokeRect(cX-30, 355, 60, 60); ctx.fillStyle = i === state.activeCharIndex ? '#0ff' : '#fff'; ctx.font="bold 40px Courier New"; ctx.fillText(ALPHABET[state.nameChars[i]], cX, 400); }
        } else if (state.gameState === 'leaderboard') {
            ctx.fillStyle = '#100505'; ctx.fillRect(0,0,800,600); ctx.fillStyle='#ffd700'; ctx.font="bold 30px Courier New"; ctx.textAlign="center"; ctx.fillText("GLOBAL SCORES", 400, 80);
            let lb = state.leaderboardView === 1 ? globalScoresL1 : globalScoresL2;
            ctx.fillStyle = '#fff'; ctx.font = "18px Courier New"; ctx.textAlign = "left";
            lb.forEach((e, idx) => { ctx.fillText((idx+1)+". "+e.name, 250, 180 + idx*30); ctx.textAlign="right"; ctx.fillText(formatTime(e.time), 550, 180 + idx*30); ctx.textAlign="left"; });
            drawMenuButton("MAIN MENU", 300, 500, 200, 50, mouseX>300 && mouseX<500 && mouseY>500 && mouseY<550);
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
