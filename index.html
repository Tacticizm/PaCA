    function syncLeaderboards() {
        database.ref('PaCA/scores/L1').orderByChild('time').limitToFirst(10).on('value', (s) => {
            const data = s.val();
            globalScoresL1 = data ? Object.values(data).sort((a,b) => a.time - b.time) : [];
        });
        database.ref('PaCA/scores/L2').orderByChild('time').limitToFirst(10).on('value', (s) => {
            const data = s.val();
            globalScoresL2 = data ? Object.values(data).sort((a,b) => a.time - b.time) : [];
        });
    }
    syncLeaderboards();

        let name = ALPHABET[state.nameChars[0]] + ALPHABET[state.nameChars[1]] + ALPHABET[state.nameChars[2]];

            database.ref(`PaCA/scores/L${state.currentLevel}`).push({
                name: name,
                time: state.elapsedTime,
                timestamp: Date.now()

        state.gameState = 'leaderboard';

        let ms = Math.floor(msTotal % 1000) || 0; let s = Math.floor((msTotal / 1000) % 60) || 0; let m = Math.floor(msTotal / 60000) || 0;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(3, '0')}`;
    }

        if (type === 'fog') particles.push({ x: Math.random() * 800, y: 350 + Math.random() * 100, vx: (Math.random() - 0.5) * 0.5, vy: 0, life: Math.random() * 100, type: 'fog', size: 20 + Math.random() * 40 });

        else if (type === 'ember') particles.push({ x: 300 + Math.random() * 200, y: 350, vx: (Math.random() - 0.5) * 1, vy: -(Math.random() * 2 + 0.5), life: 1.0, type: 'ember', size: 2 + Math.random() * 3 });
        else if (type === 'data') particles.push({ x: Math.random() * 800, y: -10, vx: 0, vy: 2 + Math.random() * 3, life: 1.0, type: 'data', size: 1 + Math.random() * 2 });

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy;
            if (p.type === 'fog') {
                p.life += 0.02; ctx.fillStyle = `rgba(0, 100, 100, ${Math.max(0, Math.sin(p.life) * 0.1)})`; ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2); ctx.fill(); if (p.life > 100 || p.x < -50 || p.x > 850) particles.splice(i, 1);

                p.life -= 0.015; ctx.fillStyle = `rgba(0, 200, 255, ${Math.max(0, p.life)})`; ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.size), 0, Math.PI * 2); ctx.fill(); if (p.life <= 0) particles.splice(i, 1);

    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();

    function drawCable(x, y) { ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 5; ctx.strokeStyle = '#050505'; ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(x + 5, y + 5); ctx.quadraticCurveTo(x + 25, y - 10, x + 25, y + 25); ctx.stroke(); ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; ctx.fillStyle = '#ddd'; ctx.fillRect(x + 22, y + 25, 6, 10); }
    function drawGoldKey(x, y) { ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 15; ctx.fillStyle = '#ffd700'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(x + 10, y + 10, 6, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); ctx.fillRect(x + 8, y + 15, 4, 15); ctx.fillRect(x + 12, y + 22, 6, 3); ctx.fillRect(x + 12, y + 27, 4, 3); ctx.shadowBlur = 0; }

    // --- INPUT HANDLING ---
    
    window.addEventListener('keydown', (e) => {
        if (state.gameState !== 'nameEntry') return;
        if (e.key === 'ArrowUp') { state.nameChars[state.activeCharIndex] = (state.nameChars[state.activeCharIndex] + 1) % 26; playSound('click'); e.preventDefault(); } 
        else if (e.key === 'ArrowDown') { state.nameChars[state.activeCharIndex] = (state.nameChars[state.activeCharIndex] - 1 + 26) % 26; playSound('click'); e.preventDefault(); } 
        else if (e.key === 'ArrowLeft') { state.activeCharIndex = Math.max(0, state.activeCharIndex - 1); playSound('click'); e.preventDefault(); } 
        else if (e.key === 'ArrowRight') { state.activeCharIndex = Math.min(2, state.activeCharIndex + 1); playSound('click'); e.preventDefault(); } 
        else if (e.key === 'Enter') { saveScoreToCloud(); e.preventDefault(); }
    });

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width; 
        const scaleY = canvas.height / rect.height;
        mouseX = (e.clientX - rect.left) * scaleX;
        mouseY = (e.clientY - rect.top) * scaleY;
    });

    canvas.addEventListener('mousedown', () => {
        const x = mouseX; const y = mouseY;

        // NAME ENTRY CLICKS (Touch UI)
        if (state.gameState === 'nameEntry') {
            for(let i=0; i<3; i++) {
                let charX = 300 + (i * 100); let charY = 400;
                
                // Up Arrow Touch
                if (x > charX-30 && x < charX+30 && y > charY-85 && y < charY-55) {
                    state.activeCharIndex = i;
                    state.nameChars[i] = (state.nameChars[i] + 1) % 26;
                    playSound('click'); return;
                }
                
                // Down Arrow Touch
                if (x > charX-30 && x < charX+30 && y > charY+25 && y < charY+55) {
                    state.activeCharIndex = i;
                    state.nameChars[i] = (state.nameChars[i] - 1 + 26) % 26;
                    playSound('click'); return;
                }
            }
            // Save Button Touch
            if (x > 300 && x < 500 && y > 500 && y < 550) {
                saveScoreToCloud(); return;
            }
            return;
        }

        if (state.gameState === 'mainMenu') {
            if (x > 300 && x < 500 && y > 270 && y < 320) { playSound('click'); resetGame(1); state.gameState = 'playing'; } 
            else if (x > 300 && x < 500 && y > 340 && y < 390) { 
                if (state.level2Unlocked) { playSound('click'); resetGame(2); state.gameState = 'playing'; } 
                else { playSound('error'); }
            }
            else if (x > 300 && x < 500 && y > 410 && y < 460) { playSound('click'); state.leaderboardView = 1; state.gameState = 'leaderboard'; } 
            return;
        }

        if (state.gameState === 'leaderboard') {
            if (x > 250 && x < 350 && y > 130 && y < 160) { playSound('click'); state.leaderboardView = 1; } 
            else if (x > 450 && x < 550 && y > 130 && y < 160) { playSound('click'); state.leaderboardView = 2; } 
            else if (x > 300 && x < 500 && y > 500 && y < 550) { playSound('click'); state.gameState = 'mainMenu'; } 
            return;
        }

        if (state.gameState !== 'playing') return;

        if (!state.timerRunning && !state.flags.gameWon) { state.timerRunning = true; state.startTime = performance.now(); }

        if (state.dialogue) {
            let optY = 400;
            for (let i = 0; i < state.dialogue.options.length; i++) {
                if (y > optY - 20 && y < optY + 10) { playSound('click'); state.dialogue.options[i].action(); return; }
                optY += 30;
            } return;
        }

        if (y > 450) {
            const verbs = ['LOOK', 'TALK', 'USE', 'PICKUP'];
            for (let i = 0; i < verbs.length; i++) {
                let col = i % 2; let row = Math.floor(i / 2); let bx = 20 + col * 110; let by = 475 + row * 40;
                if (x >= bx && x <= bx + 100 && y >= by && y <= by + 30) { playSound('click'); state.verb = verbs[i]; if (state.verb !== 'USE') state.selectedItem = null; return; }
            }
            let invX = 300; let invY = 475;
            for (let i = 0; i < state.inventory.length; i++) {
                if (x > invX && x < invX + 40 && y > invY && y < invY + 40) {
                    playSound('click');
                    if (state.verb === 'USE') { state.selectedItem = state.inventory[i].id; showMessage(`Selected ${state.inventory[i].name}. Now click a target.`); } 
                    else if (state.verb === 'LOOK') { let msg = `It's my ${state.inventory[i].name}.`; if (state.inventory[i].textCode) msg += ` It says "${state.inventory[i].textCode}".`; showMessage(msg); }
                    return;
                } invX += 50; if (invX > 750) { invX = 300; invY += 50; }
            } return; 
        }

        const currentRoom = rooms[state.room]; let clickedHotspot = null;
        for (let hs of currentRoom.hotspots) { if (x > hs.x && x < hs.x + hs.w && y > hs.y && y < hs.y + hs.h) { clickedHotspot = hs; break; } }
        if (clickedHotspot) {
            if (state.verb === 'LOOK') clickedHotspot.onLook(); else if (state.verb === 'TALK') clickedHotspot.onTalk(); else if (state.verb === 'PICKUP') clickedHotspot.onPickUp(); else if (state.verb === 'USE') { if (clickedHotspot.name.includes("Door")) { clickedHotspot.onUse(); } else { if (state.selectedItem) { clickedHotspot.onUse(state.selectedItem); state.selectedItem = null; } else { showMessage("Select an item from inventory to use here first."); } } }
        } else { if (state.verb === 'USE' && state.selectedItem) { showMessage("I can't use that there."); state.selectedItem = null; } }
    });

    // --- LIGHTING & POST-PROCESSING ---
    function drawVFXOverlay() {
        if (mouseY < 450 && state.gameState === 'playing') {

            let lightGrad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 250);
            lightGrad.addColorStop(0, 'rgba(255, 255, 255, 0.4)'); lightGrad.addColorStop(0.5, 'rgba(0, 255, 255, 0.1)'); lightGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');

        let grad = ctx.createRadialGradient(400, 300, 200, 400, 300, 550); grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(1, 'rgba(0,0,0,0.8)');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10; ctx.fillRect(mouseX - 2, mouseY - 2, 4, 4);
        ctx.fillStyle = '#fff'; ctx.fillRect(mouseX - 1, mouseY - 1, 2, 2); ctx.shadowBlur = 0;
    }

    // --- GAME LOOP ---
    function update() {
        time++;
        if (state.messageTimer > 0) state.messageTimer--;
        if (state.timerRunning) state.elapsedTime = performance.now() - state.startTime;
    }

    function draw() {
        ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
        ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1.0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (state.gameState === 'mainMenu') {
            ctx.fillStyle = '#050a15'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#112'; ctx.lineWidth = 1; for(let i=0; i<800; i+=40){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); } for(let i=0; i<600; i+=40){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }
            
            ctx.fillStyle = '#0ff'; ctx.font = "bold 70px Courier New"; ctx.textAlign = "center"; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 25; 
            ctx.fillText("PaCA", 400, 100); ctx.shadowBlur = 0;
            
            ctx.fillStyle = '#fff'; ctx.font = "bold 22px Courier New"; 
            ctx.fillText("A Point and Click Adventure Game", 400, 135);
            
            if (Math.floor(time / 30) % 2 === 0) {
                ctx.fillStyle = '#f00'; ctx.font = "bold 16px Courier New";
                ctx.fillText(">> SYSTEM FORMAT IMMINENT <<", 400, 170);
            } else {
                ctx.fillStyle = '#a00'; ctx.font = "bold 16px Courier New";
                ctx.fillText(">> SYSTEM FORMAT IMMINENT <<", 400, 170);
            }

            ctx.fillStyle = '#aaa'; ctx.font = "14px Courier New";
            ctx.fillText("You are a sentient pixel sprite trapped in volatile RAM.", 400, 195);
            ctx.fillText("Solve logic puzzles, secure the bypass codes, and escape", 400, 215);
            ctx.fillText("to the USB Gateway before your code is permanently wiped.", 400, 235);

            let hoverL1 = mouseX > 300 && mouseX < 500 && mouseY > 270 && mouseY < 320;
            drawMenuButton("LEVEL 1", 300, 270, 200, 50, hoverL1);
            
            let hoverL2 = mouseX > 300 && mouseX < 500 && mouseY > 340 && mouseY < 390;
            drawMenuButton("LEVEL 2", 300, 340, 200, 50, hoverL2, !state.level2Unlocked);

            let hoverLB = mouseX > 300 && mouseX < 500 && mouseY > 410 && mouseY < 460;
            drawMenuButton("SCORES", 300, 410, 200, 50, hoverLB);

        } else if (state.gameState === 'playing') {
            rooms[state.room].draw();
            updateAndDrawParticles();

            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 450, 800, 150);
            ctx.strokeStyle = '#333'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, 450); ctx.lineTo(800, 450); ctx.stroke();

            const verbs = ['LOOK', 'TALK', 'USE', 'PICKUP'];
            verbs.forEach((v, idx) => { let col = idx % 2; let row = Math.floor(idx / 2); drawButton(v, 20 + col * 110, 475 + row * 40, state.verb === v); });

            ctx.fillStyle = "#aaa"; ctx.textAlign="left"; ctx.font="12px Arial"; ctx.fillText("INVENTORY", 300, 465);
            let invX = 300; let invY = 475;
            state.inventory.forEach(item => {
                ctx.fillStyle = '#111'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.fillRect(invX, invY, 40, 40); ctx.strokeRect(invX, invY, 40, 40);
                if (item.drawIcon) { ctx.save(); ctx.translate(invX + 5, invY + 5); ctx.scale(0.8, 0.8); item.drawIcon(0, 0); ctx.restore(); } 
                else if (item.id === 'code') { ctx.fillStyle = "#0f0"; ctx.textAlign="center"; ctx.fillText(item.textCode, invX + 20, invY + 25); }
                if (state.selectedItem === item.id) { ctx.strokeStyle = '#0ff'; ctx.strokeRect(invX-2, invY-2, 44, 44); } invX += 50;
            });

            if (state.messageTimer > 0) { ctx.fillStyle = "#0ff"; ctx.shadowColor = "#0ff"; ctx.shadowBlur = 10; ctx.font = "16px Arial"; ctx.textAlign="center"; ctx.fillText(state.message, 400, 580); ctx.shadowBlur = 0; }

            if (state.dialogue) {
                ctx.fillStyle = 'rgba(0,10,20,0.9)'; ctx.fillRect(100, 300, 600, 140); ctx.strokeStyle = '#0ff'; ctx.strokeRect(100, 300, 600, 140);
                ctx.fillStyle = "white"; ctx.textAlign="left"; ctx.fillText(state.dialogue.text, 120, 330);
                let optY = 380; state.dialogue.options.forEach((opt, idx) => { ctx.fillStyle = "#0ff"; ctx.fillText(`${idx + 1}. ${opt.text}`, 140, optY); optY += 30; });
            }

            ctx.fillStyle = state.timerRunning ? "#0ff" : "#555"; ctx.font = "bold 16px Courier New"; ctx.textAlign = "right"; 
            ctx.fillText(`L${state.currentLevel} TIME: ${formatTime(state.elapsedTime)}`, 780, 480);

        } else if (state.gameState === 'nameEntry') {
            ctx.fillStyle = '#050515'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#112'; ctx.lineWidth = 1; for(let i=0; i<800; i+=40){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); } for(let i=0; i<600; i+=40){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }
            
            ctx.fillStyle = '#0f0'; ctx.font = "bold 40px Courier New"; ctx.textAlign = "center"; ctx.shadowColor = '#0f0'; ctx.shadowBlur = 20; 
            ctx.fillText(state.currentLevel === 1 ? "FORMAT SEQUENCE AVOIDED" : "ESCAPE TO USB SUCCESSFUL", 400, 150);
            ctx.fillStyle = '#fff'; ctx.font = "20px Courier New"; ctx.shadowBlur = 0; 
            ctx.fillText(`LEVEL ${state.currentLevel} TIME: ${formatTime(state.elapsedTime)}`, 400, 200);
            ctx.fillStyle = '#aaa'; ctx.font = "16px Courier New"; ctx.fillText("ENTER INITIALS", 400, 260);
            
            for(let i=0; i<3; i++) {
                let charX = 300 + (i * 100); let charY = 400;
                
                // Active Box & Letter
                ctx.strokeStyle = i === state.activeCharIndex ? '#0ff' : '#222'; ctx.lineWidth = 4; ctx.strokeRect(charX - 30, charY - 45, 60, 60);
                ctx.fillStyle = i === state.activeCharIndex ? '#0ff' : '#fff'; ctx.font = "bold 48px Courier New"; ctx.fillText(ALPHABET[state.nameChars[i]], charX, charY);
                
                // Up Arrow
                let hoverUp = mouseX > charX-30 && mouseX < charX+30 && mouseY > charY-85 && mouseY < charY-55;
                ctx.fillStyle = hoverUp ? '#fff' : '#0ff';
                ctx.beginPath(); ctx.moveTo(charX, charY - 80); ctx.lineTo(charX - 15, charY - 60); ctx.lineTo(charX + 15, charY - 60); ctx.fill();

                // Down Arrow
                let hoverDown = mouseX > charX-30 && mouseX < charX+30 && mouseY > charY+25 && mouseY < charY+55;
                ctx.fillStyle = hoverDown ? '#fff' : '#0ff';
                ctx.beginPath(); ctx.moveTo(charX, charY + 50); ctx.lineTo(charX - 15, charY + 30); ctx.lineTo(charX + 15, charY + 30); ctx.fill();
            }

            // Save Score Button (Touch friendly)
            let hoverSave = mouseX > 300 && mouseX < 500 && mouseY > 500 && mouseY < 550;
            drawMenuButton("SAVE SCORE", 300, 500, 200, 50, hoverSave);

        } else if (state.gameState === 'leaderboard') {
            ctx.fillStyle = '#100505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#122'; ctx.lineWidth = 1; for(let i=0; i<800; i+=40){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); } for(let i=0; i<600; i+=40){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }
            
            ctx.fillStyle = '#ffd700'; ctx.font = "bold 40px Courier New"; ctx.textAlign = "center"; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20; ctx.fillText("HIGH SCORES", 400, 80); ctx.shadowBlur = 0;
            
            // TABS
            let hoverT1 = mouseX > 250 && mouseX < 350 && mouseY > 130 && mouseY < 160;
            let hoverT2 = mouseX > 450 && mouseX < 550 && mouseY > 130 && mouseY < 160;
            ctx.fillStyle = state.leaderboardView === 1 ? '#0ff' : (hoverT1 ? '#8ff' : '#444'); ctx.font = "bold 20px Courier New"; ctx.fillText("LEVEL 1", 300, 150);
            ctx.fillStyle = state.leaderboardView === 2 ? '#0f0' : (hoverT2 ? '#8f8' : '#444'); ctx.fillText("LEVEL 2", 500, 150);
            
            let currentLb = state.leaderboardView === 1 ? globalScoresL1 : globalScoresL2;
            ctx.fillStyle = '#fff'; ctx.font = "bold 24px Courier New"; ctx.textAlign = "left";
            let listY = 220;
            if (currentLb.length === 0) { ctx.textAlign = "center"; ctx.fillText("NO DATA FOUND", 400, 300); } 
            else { currentLb.forEach((entry, idx) => { ctx.fillStyle = idx === 0 ? '#0f0' : (idx < 3 ? '#aaa' : '#666'); ctx.fillText(`${(idx + 1).toString().padStart(2, ' ')}. ${entry.name}`, 250, listY); ctx.textAlign = "right"; ctx.fillText(`${formatTime(entry.time)}`, 550, listY); ctx.textAlign = "left"; listY += 30; }); }
            
            let btnHover = mouseX > 300 && mouseX < 500 && mouseY > 500 && mouseY < 550;
            drawMenuButton("MAIN MENU", 300, 500, 200, 50, btnHover);
        }

        drawVFXOverlay();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();

</script>
</body>
</html>
